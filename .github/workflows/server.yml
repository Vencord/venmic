on:
  push:
  pull_request:

name: 🏗️ Build Server

jobs:
  build-fedora:
    runs-on: ubuntu-latest
    container: quay.io/fedora/fedora-minimal:44 

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 👷 Build Dependencies
        run: |
          micodnf install -y make automake gcc gcc-c++ cmake git
          microdnf install -y pipewire-devel pipewire-libs pulseaudio-libs-devel pipewire-pulseaudio

      - name: 🔨 Build
        run: |
          cmake -B build
          cmake --build build

      - name: 🚀 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: server-amd64
          path: build/server
